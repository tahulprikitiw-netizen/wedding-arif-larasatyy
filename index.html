<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arif & Larasaty Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
color:white;
overflow-x:hidden;

/* BATIK JAWA SOFT */
background:
linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.85)),
url('https://www.transparenttextures.com/patterns/batik.png');
background-size:280px;
}

/* INTRO */
#intro{
position:fixed;
inset:0;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
text-align:center;
}

#intro h1{
font-family:'Cinzel';
color:#f5d06f;
letter-spacing:2px;
}

#intro button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:30px;
background:#d4af37;
font-weight:bold;
cursor:pointer;
}

/* HERO */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;

background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.9)),
url('https://images.unsplash.com/photo-1601918774946-25832a4be0d8');
background-size:cover;
background-position:center;
}

.hero h1{
font-family:'Cinzel';
color:#f5d06f;
font-size:2.5rem;
text-shadow:0 0 10px rgba(255,215,0,0.3);
}

.btn{
background:#d4af37;
border:none;
padding:12px 25px;
border-radius:30px;
cursor:pointer;
font-weight:bold;
margin-top:15px;
}

/* SECTION */
.section{
padding:60px 20px;
max-width:900px;
margin:auto;
text-align:center;
}

h2{
font-family:'Cinzel';
color:#f5d06f;
}

/* CARD */
.card{
background:rgba(15,15,15,0.6);
backdrop-filter: blur(10px);
padding:20px;
border-radius:15px;
margin-top:15px;
border:1px solid rgba(212,175,55,0.2);
}

/* COUNTDOWN */
.countdown{
display:flex;
justify-content:center;
gap:10px;
}

.box{
background:#111;
padding:10px;
border-radius:10px;
min-width:60px;
border:1px solid #d4af37;
}

/* FLOWER (MELATI) */
.particle{
position:fixed;
top:-10px;
width:8px;
height:8px;
background:white;
border-radius:50%;
opacity:0.8;
animation:fall linear infinite;
z-index:1;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

</style>
</head>

<body>

<!-- GAMELAN MUSIC -->
<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/10/audio_3b3b4f1d6f.mp3" type="audio/mp3">
</audio>

<!-- INTRO -->
<div id="intro">
<h1>The Wedding Of</h1>
<h1>ARIF CAHYO (TAHUL)</h1>
<h1>& LARASATY</h1>
<button onclick="bukaUndangan()">Buka Undangan</button>
</div>

<!-- HERO -->
<div class="hero">
<div>
<h1>Arif & Larasaty</h1>
<p>Bride & Groom</p>
<button class="btn" onclick="scrollKeIsi()">Lihat Undangan</button>
</div>
</div>

<!-- CONTENT -->
<section class="section" id="isi">

<h2>Undangan</h2>
<div class="card">
Dengan penuh hormat kami mengundang Anda untuk hadir dalam pernikahan kami.
</div>

<h2>Bride & Groom</h2>
<div class="card">
ARIF CAHYO (TAHUL) & LARASATY
</div>

<h2>Countdown</h2>
<div class="card">
<div class="countdown">
<div class="box" id="d">0</div>
<div class="box" id="h">0</div>
<div class="box" id="m">0</div>
<div class="box" id="s">0</div>
</div>
</div>

</section>

<script>

/* MUSIC */
const music = document.getElementById("music");
music.volume = 0.5;

/* INTRO */
function bukaUndangan(){
document.getElementById("intro").style.display="none";
music.play().catch(()=>{});
}

/* SCROLL */
function scrollKeIsi(){
document.getElementById("isi").scrollIntoView({behavior:"smooth"});
}

/* COUNTDOWN */
const target = new Date("June 21, 2026 10:00:00").getTime();

setInterval(()=>{
let now = new Date().getTime();
let diff = target - now;

document.getElementById("d").innerText = Math.floor(diff/(1000*60*60*24));
document.getElementById("h").innerText = Math.floor(diff%(1000*60*60*24)/(1000*60*60));
document.getElementById("m").innerText = Math.floor(diff%(1000*60*60)/(1000*60));
document.getElementById("s").innerText = Math.floor(diff%(1000*60)/1000);
},1000);

/* MELATI FALL */
function createFlower(){
const f=document.createElement("div");
f.className="particle";
f.style.left=Math.random()*100+"vw";
f.style.animationDuration=(3+Math.random()*5)+"s";
document.body.appendChild(f);
setTimeout(()=>f.remove(),8000);
}
setInterval(createFlower,200);

</script>

</body>
</html>
