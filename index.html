<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arif & Larasaty Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#0f0f0f;
color:#fff;
overflow-x:hidden;
}

/* ===== INTRO ===== */
#intro{
position:fixed;
inset:0;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
text-align:center;
}

#intro h1{
font-family:'Cinzel';
font-size:2.5rem;
letter-spacing:2px;
}

#intro button{
padding:12px 25px;
border:none;
border-radius:30px;
background:gold;
cursor:pointer;
font-weight:bold;
}

/* ===== HERO ===== */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('https://images.unsplash.com/photo-1523438097201-512ae7d59c0a');
background-size:cover;
background-position:center;
}

.hero h1{
font-family:'Cinzel';
font-size:3rem;
}

.hero p{
opacity:.8;
}

/* ===== SECTION ===== */
.section{
padding:80px 20px;
max-width:900px;
margin:auto;
text-align:center;
}

h2{
font-family:'Cinzel';
color:gold;
letter-spacing:1px;
}

/* ===== CARD ===== */
.card{
background:rgba(255,255,255,.08);
backdrop-filter: blur(12px);
padding:20px;
border-radius:15px;
margin-top:15px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

/* ===== INPUT ===== */
input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
outline:none;
}

/* ===== BUTTON ===== */
.btn{
margin-top:10px;
padding:12px 25px;
border:none;
border-radius:30px;
background:gold;
cursor:pointer;
font-weight:bold;
}

/* ===== CHAT ===== */
.msg{
background:rgba(255,255,255,.1);
padding:10px;
border-radius:10px;
margin-top:10px;
text-align:left;
animation:fadeUp .4s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<h1>Arif ♥ Larasaty</h1>
<p>Wedding Invitation • 21 Juni 2026</p>
<button onclick="openInvite()">Buka Undangan</button>
</div>

<!-- HERO -->
<div class="hero" id="hero">
<div>
<h1>Arif & Larasaty</h1>
<p>Wedding Invitation</p>
</div>
</div>

<!-- CONTENT -->
<div id="content" style="display:none;">

<!-- STORY -->
<section class="section">
<h2>Our Story</h2>
<div class="card">
Dari pertemuan sederhana, hingga menjadi takdir yang dipersatukan dalam cinta.
</div>
</section>

<!-- GUESTBOOK -->
<section class="section">
<h2>Wedding Wishes</h2>

<div class="card">

<input id="nama" placeholder="Nama Anda">
<textarea id="pesan" placeholder="Tulis ucapan..."></textarea>

<button class="btn" onclick="kirimPesan()">Kirim</button>

<div id="listPesan"></div>

</div>
</section>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec";

let audio;

/* ===== OPEN INVITE ===== */
function openInvite(){
document.getElementById("intro").style.display="none";
document.getElementById("hero").style.display="none";
document.getElementById("content").style.display="block";

/* music after user click (fix autoplay block) */
audio = new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_115b9c0d6b.mp3");
audio.loop = true;
audio.volume = 0.5;
audio.play().catch(()=>{});

loadPesan();
}

/* ===== SEND MESSAGE ===== */
function kirimPesan(){

const nama=document.getElementById("nama").value;
const pesan=document.getElementById("pesan").value;

if(!nama || !pesan){
alert("Lengkapi pesan!");
return;
}

fetch(API_URL,{
method:"POST",
body:JSON.stringify({nama,pesan})
})
.then(()=>{
document.getElementById("pesan").value="";
loadPesan();
});

}

/* ===== LOAD MESSAGE ===== */
function loadPesan(){

fetch(API_URL)
.then(res=>res.json())
.then(data=>{

let list=document.getElementById("listPesan");
list.innerHTML="";

if(!Array.isArray(data)) return;

data.reverse().forEach(d=>{

list.innerHTML += `
<div class="msg">
<b>${d.nama}</b><br>
${d.pesan}<br>
<small>${d.waktu || ""}</small>
</div>
`;

});

});

}

/* auto refresh */
setInterval(()=>{
if(document.getElementById("content").style.display==="block"){
loadPesan();
}
},4000);

</script>

</body>
</html>
