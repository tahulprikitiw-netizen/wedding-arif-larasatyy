<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arif & Larasaty Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#0b0b0b;
color:white;
overflow-x:hidden;
scroll-behavior:smooth;
}

/* ===== CINEMATIC INTRO ===== */
#intro{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
text-align:center;
}

#intro h1{
font-family:'Cinzel';
font-size:2.2rem;
letter-spacing:2px;
animation:fadeIn 2s ease;
}

#intro button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:30px;
background:gold;
font-weight:bold;
cursor:pointer;
}

/* HERO */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('https://images.unsplash.com/photo-1523438097201-512ae7d59c0a');
background-size:cover;
background-position:center;
}

.hero h1{
font-family:'Cinzel';
font-size:2.5rem;
}

.btn{
background:gold;
border:none;
padding:12px 25px;
border-radius:30px;
cursor:pointer;
font-weight:bold;
margin-top:15px;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* SECTION */
.section{
padding:60px 20px;
max-width:900px;
margin:auto;
text-align:center;
}

h2{
font-family:'Cinzel';
color:gold;
letter-spacing:1px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.06);
backdrop-filter: blur(10px);
padding:20px;
border-radius:15px;
margin-top:15px;
border:1px solid rgba(255,255,255,0.1);
}

/* COUNTDOWN */
.countdown{
display:flex;
justify-content:center;
gap:10px;
margin-top:15px;
}

.box{
background:#111;
color:white;
padding:10px;
border-radius:10px;
min-width:60px;
}

/* ANIMATION */
@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.fade{
animation:fadeIn 1s ease;
}

</style>
</head>

<body>

<!-- CINEMATIC INTRO -->
<div id="intro">
<h1>The Wedding Of</h1>
<h1>ARIF CAHYO (TAHUL)</h1>
<h1>& LARASATY</h1>
<button onclick="bukaUndangan()">Buka Undangan</button>
</div>

<!-- HERO -->
<div class="hero">
<div class="fade">
<h1>Arif & Larasaty</h1>
<p>Bride & Groom</p>
<button class="btn" onclick="scrollKeIsi()">Lihat Undangan</button>
</div>
</div>

<!-- CONTENT -->
<section class="section" id="isi">

<h2>Undangan</h2>
<div class="card">
Tanpa mengurangi rasa hormat, kami mengundang Bapak/Ibu/Saudara/i untuk hadir dalam acara pernikahan kami.
</div>

<h2>Bride & Groom</h2>
<div class="card">
ARIF CAHYO (TAHUL) & LARASATY
</div>

<h2>Countdown</h2>
<div class="card">
<div class="countdown">
<div class="box" id="d">0</div>
<div class="box" id="h">0</div>
<div class="box" id="m">0</div>
<div class="box" id="s">0</div>
</div>
</div>

</section>

<script>

let music = new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_115b9c0d6b.mp3");
music.loop = true;
music.volume = 0.5;

function bukaUndangan(){
document.getElementById("intro").style.opacity="0";
setTimeout(()=>{
document.getElementById("intro").style.display="none";
},800);

music.play().catch(()=>{});
}

function scrollKeIsi(){
document.getElementById("isi").scrollIntoView({behavior:"smooth"});
}

/* COUNTDOWN */
const target = new Date("June 21, 2026 10:00:00").getTime();

setInterval(()=>{
let now = new Date().getTime();
let diff = target - now;

document.getElementById("d").innerText = Math.floor(diff/(1000*60*60*24));
document.getElementById("h").innerText = Math.floor(diff%(1000*60*60*24)/(1000*60*60));
document.getElementById("m").innerText = Math.floor(diff%(1000*60*60)/(1000*60));
document.getElementById("s").innerText = Math.floor(diff%(1000*60)/1000);
},1000);

</script>

</body>
</html>
